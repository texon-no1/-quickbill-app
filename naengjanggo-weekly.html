<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>냉장고 피트니스 - 1주일 식단 📅</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4cae4f",
                        "secondary": "#FFD700",
                        "background-light": "#f6f7f6",
                        "background-dark": "#121212",
                    },
                    borderRadius: {
                        "button": "12px",
                        "card": "16px",
                    }
                }
            }
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .card-shadow {
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 600px;
            z-index: 50;
        }

        /* 로딩 스피너 커스텀 */
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #e5e7eb;
            border-left-color: #4cae4f;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="bg-[#f6f7f6] min-h-screen text-[#1a1a1a]">

    <div class="max-w-[600px] mx-auto bg-white min-h-screen shadow-sm relative pb-24">

        <!-- Modern Header -->
        <header class="p-6 pb-2 flex justify-between items-center bg-white sticky top-0 z-40">
            <div class="flex items-center gap-3">
                <span class="material-symbols-outlined text-primary text-3xl">kitchen</span>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight text-[#1a1a1a]">냉장고 피트니스 🥗</h1>
                    <p class="text-sm text-gray-500 mt-0.5">최우수 1주일 식단 파트너</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button
                    class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 hover:bg-gray-100 transition-colors">
                    <span class="material-symbols-outlined text-[22px]">notifications</span>
                </button>
                <div
                    class="w-10 h-10 rounded-full overflow-hidden border border-gray-100 bg-gray-50 flex items-center justify-center">
                    <img id="headerUserImg"
                        src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=256&h=256&auto=format&fit=crop"
                        alt="User Profile" class="w-full h-full object-cover hidden">
                    <span id="headerUserInitial" class="material-symbols-outlined text-gray-400">person</span>
                </div>
            </div>
        </header>

        <main class="p-6 pt-4 space-y-6">

            <!-- Control Section (Input Form Card) -->
            <section class="bg-white rounded-card border border-gray-100 card-shadow p-5 space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-[13px] font-semibold text-gray-500 ml-1">나의 헬스 목표</label>
                        <select id="goal"
                            class="w-full h-11 px-3 bg-gray-50 border-none rounded-button text-[14px] focus:ring-2 focus:ring-primary/20 transition-all font-medium text-gray-700">
                            <option value="diet">🥗 다이어트 (체지방 감량)</option>
                            <option value="muscle">💪 근질 향상 (벌크업)</option>
                            <option value="maintain">⚖️ 체중 유지 / 건강 관리</option>
                        </select>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[13px] font-semibold text-gray-500 ml-1">식단 스타일</label>
                        <select id="style"
                            class="w-full h-11 px-3 bg-gray-50 border-none rounded-button text-[14px] focus:ring-2 focus:ring-primary/20 transition-all font-medium text-gray-700">
                            <option value="basic">🍱 기본 한국식 식단</option>
                            <option value="high_protein">🥩 고단백 위주 식단</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-[13px] font-semibold text-gray-500 ml-1">냉장고 속 활용 재료 (선택)</label>
                    <textarea id="ingredients" rows="2" placeholder="예: 닭가슴살, 고구마, 브로콜리..."
                        class="w-full p-3 bg-gray-50 border-none rounded-button text-[14px] focus:ring-2 focus:ring-primary/20 transition-all resize-none placeholder:text-gray-400 text-gray-700 font-medium"></textarea>
                </div>

                <button id="generate-btn"
                    class="w-full h-13 py-3.5 bg-primary text-white rounded-button font-bold text-[15px] hover:bg-opacity-90 active:scale-[0.98] transition-all shadow-md shadow-primary/20">
                    오늘부터 1주일 식단 만들기
                </button>
            </section>

            <!-- Loading State -->
            <div id="loading" class="hidden py-10 text-center">
                <div class="spinner mx-auto mb-4"></div>
                <p class="text-[15px] font-medium text-gray-600 animate-pulse">따뜻하고 건강한 식단을 짜고 있어요...</p>
            </div>

            <!-- Weekly Plan Container -->
            <div id="plan-container" class="space-y-4">
                <!-- AI Generated Plan Cards will be rendered here -->
            </div>

            <!-- Footer Action -->
            <div class="pt-4 pb-8 text-center">
                <a href="naengjanggo-fitness.html"
                    class="inline-flex items-center gap-2 text-primary font-bold text-[14px] hover:underline decoration-2 underline-offset-4">
                    <span class="material-symbols-outlined text-[18px]">arrow_back</span>
                    레시피 검색으로 돌아가기
                </a>
            </div>

        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav border-t border-gray-100 glass-effect">
            <div class="flex justify-around items-center h-full px-4">
                <a href="naengjanggo-fitness.html" class="flex flex-col items-center gap-1 text-gray-400">
                    <span class="material-symbols-outlined">home</span>
                    <span class="text-[10px] font-medium">홈</span>
                </a>
                <a href="naengjanggo-fitness.html#fridge" class="flex flex-col items-center gap-1 text-gray-400">
                    <span class="text-xl">🧊</span>
                    <span class="text-[10px] font-medium">냉장고</span>
                </a>
                <a href="naengjanggo-weekly.html" class="flex flex-col items-center gap-1 text-primary">
                    <span class="material-symbols-outlined leading-none"
                        style="font-variation-settings: 'FILL' 1">calendar_month</span>
                    <span class="text-[10px] font-bold">식단</span>
                </a>
                <a href="admin.html" class="flex flex-col items-center gap-1 text-gray-400">
                    <span class="material-symbols-outlined">shield_person</span>
                    <span class="text-[10px] font-medium">관리자</span>
                </a>
                <a href="naengjanggo-fitness.html#profile" class="flex flex-col items-center gap-1 text-gray-400">
                    <span class="material-symbols-outlined">person</span>
                    <span class="text-[10px] font-medium">프로필</span>
                </a>
            </div>
        </nav>

    </div>

    <script>
        const API_BASE = "https://naengjanggo-fitness-api-1.onrender.com";
        const generateBtn = document.getElementById('generate-btn');
        const planContainer = document.getElementById('plan-container');
        const loading = document.getElementById('loading');

        window.onload = () => {
            const savedIngredients = localStorage.getItem('naengjanggo_ingredients');
            if (savedIngredients) {
                document.getElementById('ingredients').value = savedIngredients;
            }

            // 헤더 사용자 정보 연동
            const userName = localStorage.getItem('naengjanggo_user_name');
            const userPhoto = localStorage.getItem('naengjanggo_user_photo');
            const headerUserImg = document.getElementById('headerUserImg');
            const headerUserInitial = document.getElementById('headerUserInitial');

            if (userPhoto && headerUserImg) {
                headerUserImg.src = userPhoto;
                headerUserImg.classList.remove('hidden');
                headerUserInitial.classList.add('hidden');
            } else if (userName && headerUserInitial) {
                headerUserInitial.textContent = userName.charAt(0);
            }
        };

        generateBtn.onclick = async () => {
            const goal = document.getElementById('goal').value;
            const style = document.getElementById('style').value;
            const ingredients = document.getElementById('ingredients').value;

            localStorage.setItem('naengjanggo_ingredients', ingredients);

            planContainer.innerHTML = '';
            loading.style.display = 'block';
            generateBtn.disabled = true;

            try {
                const res = await fetch(`${API_BASE}/api/weekly-plan`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ goal, style, ingredients })
                });

                const data = await res.json();

                if (data.plan && data.plan.length > 0) {
                    renderPlan(data.plan);
                } else {
                    alert('식단을 생성하지 못했습니다. 다시 시도해 주세요.');
                }
            } catch (err) {
                console.error(err);
                alert('서버와 통신 중 에러가 발생했습니다.');
            } finally {
                loading.style.display = 'none';
                generateBtn.disabled = false;
            }
        };

        function renderIngredients(ingredients) {
            if (!ingredients || ingredients.length === 0) return '';
            return `
                <div class="ingredients-panel hidden mt-3 p-4 bg-gray-50 rounded-xl border border-gray-100">
                    <h4 class="text-[12px] font-bold text-gray-400 mb-2 flex items-center gap-1.5 uppercase tracking-wider">
                        <span class="material-symbols-outlined text-[14px]">shopping_basket</span> 
                        필요한 재료
                    </h4>
                    <ul class="space-y-1.5">
                        ${ingredients.map(ing => `
                            <li class="flex items-start gap-2 text-[13px] text-gray-600 font-medium">
                                <span class="text-primary mt-0.5 text-[10px]">●</span>
                                ${ing}
                            </li>
                        `).join('')}
                    </ul>
                </div>
            `;
        }

        function renderMeal(label, mealName, ingredients) {
            const hasIngredients = ingredients && ingredients.length > 0;
            const labelColors = {
                '아침': 'bg-blue-50 text-blue-500',
                '점심': 'bg-orange-50 text-orange-500',
                '저녁': 'bg-purple-50 text-purple-500'
            };
            const colorClass = labelColors[label] || 'bg-gray-50 text-gray-500';

            return `
                <div class="py-4 border-b border-gray-50 last:border-0">
                    <div class="flex items-center justify-between gap-4">
                        <div class="flex items-center gap-3">
                            <span class="w-10 h-6 flex items-center justify-center rounded-md ${colorClass} text-[11px] font-bold leading-none shrink-0">${label}</span>
                            <span class="text-[15px] font-semibold text-gray-800 leading-tight">${mealName}</span>
                        </div>
                        ${hasIngredients ? `
                            <button class="ingredients-toggle-btn w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 hover:bg-gray-100 hover:text-primary transition-all">
                                <span class="material-symbols-outlined text-[20px]">expand_circle_down</span>
                            </button>
                        ` : ''}
                    </div>
                    ${hasIngredients ? renderIngredients(ingredients) : ''}
                </div>
            `;
        }

        function renderPlan(plan) {
            planContainer.innerHTML = plan.map((day, idx) => `
                <div class="bg-white rounded-card border border-gray-100 card-shadow p-5 overflow-hidden transition-all hover:scale-[1.01]">
                    <div class="flex items-center justify-between mb-2">
                        <h3 class="text-[17px] font-bold text-gray-900">${day.day}</h3>
                        ${idx === 0 ? '<span class="px-2 py-0.5 bg-primary/10 text-primary text-[10px] font-bold rounded-md">TODAY</span>' : ''}
                    </div>
                    <div class="divide-y divide-gray-50">
                        ${renderMeal('아침', day.breakfast, day.breakfast_ingredients)}
                        ${renderMeal('점심', day.lunch, day.lunch_ingredients)}
                        ${renderMeal('저녁', day.dinner, day.dinner_ingredients)}
                    </div>
                </div>
            `).join('');
        }

        document.addEventListener('click', (e) => {
            const btn = e.target.closest('.ingredients-toggle-btn');
            if (!btn) return;

            const panel = btn.closest('div').nextElementSibling;
            if (!panel || !panel.classList.contains('ingredients-panel')) return;

            const isOpen = !panel.classList.contains('hidden');
            if (isOpen) {
                panel.classList.add('hidden');
                btn.classList.remove('rotate-180', 'text-primary');
            } else {
                panel.classList.remove('hidden');
                btn.classList.add('rotate-180', 'text-primary');
            }
        });
    </script>
</body>

</html>
