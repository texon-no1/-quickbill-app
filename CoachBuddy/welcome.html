<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoachBuddy - 시작하기</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
</head>

<body class="welcome-body">
    <div class="welcome-container">
        <div class="logo-welcome">
            <img src="asset_main_logo.svg" alt="CoachBuddy Logo">
            <span>CoachBuddy</span>
        </div>
        <h2>전문 코칭 카테고리를 선택하세요</h2>
        <p class="text-secondary">코칭 분야에 맞춘 정밀 분석 엔진과 프리미엄 디자인이 적용됩니다.</p>

        <div class="category-grid">
            <div class="category-card" onclick="selectCategory('basketball')">
                <img src="asset_basketball.svg" alt="Basketball Coach">
                <div class="category-title">농구 코치</div>
                <div class="category-desc">슈팅 폼, 밸런스, 물리 메트릭 정밀 분석</div>
            </div>
            <div class="category-card" onclick="selectCategory('yoga')">
                <img src="asset_yoga.svg" alt="Yoga Instructor">
                <div class="category-title">요가 강사</div>
                <div class="category-desc">자세 대칭성, 유연성 및 균형 잡기 전문 코칭</div>
            </div>
            <div class="category-card" onclick="selectCategory('dance')">
                <img src="asset_dance.svg" alt="Dance Coach">
                <div class="category-title">댄스 안무가</div>
                <div class="category-desc">동작 일치율, 예술적 선 및 박자 감각 분석</div>
            </div>
        </div>
    </div>

    <script>
        function selectCategory(cat) {
            localStorage.setItem('selectedCategory', cat);
            // Effect: Flash the card or something
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
