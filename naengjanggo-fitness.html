<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>냉장고 피트니스 🥗</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Noto+Sans+KR:wght@300;400;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg-color: #FAFAF7;
      --card-bg: #FFFFFF;
      --accent-olive: #5A7A4A;
      --accent-orange: #E8734A;
      --text-main: #2C2416;
      --text-muted: #7A7060;
      --border-color: #E8E4DC;
      --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'DM Sans', 'Noto Sans KR', sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      line-height: 1.6;
      overflow-x: hidden;
    }

    header {
      background-color: var(--accent-olive);
      color: white;
      padding: 28px 24px;
    }

    header .title {
      font-size: 1.6rem;
      font-weight: 700;
    }

    header .subtitle {
      font-size: 0.95rem;
      margin-top: 6px;
      opacity: 0.9;
    }

    main {
      max-width: 1080px;
      margin: 32px auto;
      padding: 0 20px 60px;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 20px;
    }

    @media (max-width: 768px) {
      main { grid-template-columns: 1fr; }
    }

    .panel {
      background-color: var(--card-bg);
      border-radius: 20px;
      padding: 28px 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border-color);
    }

    .panel-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 20px;
      color: var(--text-main);
    }

    .field-group {
      margin-bottom: 20px;
    }

    .field-label {
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 6px;
      display: block;
      color: var(--text-main);
    }

    .help-text {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .radio-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .radio-pill {
      border-radius: 999px;
      border: 1.5px solid var(--border-color);
      padding: 7px 16px;
      font-size: 0.85rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background-color: var(--bg-color);
      color: var(--text-main);
      transition: all 0.15s;
    }

    .radio-pill:has(input:checked) {
      background-color: var(--accent-olive);
      border-color: var(--accent-olive);
      color: white;
    }

    .radio-pill input { margin: 0; display: none; }

    textarea {
      width: 100%;
      min-height: 90px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1.5px solid var(--border-color);
      resize: vertical;
      font-size: 0.9rem;
      background-color: var(--bg-color);
      color: var(--text-main);
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent-olive);
      box-shadow: 0 0 0 3px rgba(90, 122, 74, 0.12);
    }

    .btn-recommend {
      width: 100%;
      padding: 14px 12px;
      border-radius: 999px;
      border: none;
      background-color: var(--accent-olive);
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.15s, opacity 0.15s;
    }

    .btn-recommend:hover { transform: scale(1.02); }

    .btn-recommend:disabled {
      background-color: var(--text-muted);
      cursor: not-allowed;
      transform: none;
    }

    .weekly-link {
      margin-top: 20px;
      text-align: center;
      border-top: 1px dashed var(--border-color);
      padding-top: 18px;
    }

    .weekly-link a {
      font-size: 0.9rem;
      color: var(--accent-orange);
      text-decoration: none;
      font-weight: 700;
    }

    .weekly-link a:hover { text-decoration: underline; }

    .recipes-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .recipes-header small {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .recipe-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .recipe-card {
      border-radius: 16px;
      border: 1.5px solid var(--border-color);
      padding: 20px;
      background-color: var(--bg-color);
      transition: box-shadow 0.2s;
    }

    .recipe-card:hover {
      box-shadow: var(--shadow);
    }

    .recipe-name {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--text-main);
    }

    .recipe-tags {
      font-size: 0.8rem;
      color: var(--accent-olive);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .recipe-desc {
      font-size: 0.88rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .steps-toggle-btn {
      width: auto;
      margin-top: 8px;
      font-size: 0.82rem;
      padding: 6px 14px;
      border-radius: 999px;
      border: 1.5px solid var(--border-color);
      background-color: var(--card-bg);
      color: var(--text-main);
      cursor: pointer;
      font-weight: 600;
    }

    .steps-toggle-btn:hover {
      border-color: var(--accent-olive);
      color: var(--accent-olive);
      transform: none;
    }

    .recipe-link a {
      font-size: 0.82rem;
      color: var(--accent-orange);
      text-decoration: none;
      font-weight: 600;
    }

    .recipe-link a:hover { text-decoration: underline; }

    footer {
      text-align: center;
      font-size: 0.82rem;
      color: var(--text-muted);
      padding: 20px 0 40px;
      border-top: 1px solid var(--border-color);
    }
  </style>
</head>

<body>
  <header>
    <div class="title">냉장고 피트니스 🥗</div>
    <div class="subtitle">
      냉장고 속 재료와 목표(다이어트·근력·유지)를 넣으면, 지금 몸 상태에 맞는 한 끼를 추천해 드립니다.
    </div>
  </header>

  <main>
    <section class="panel">
      <div class="panel-title">1. 목표와 재료를 알려주세요</div>

      <div class="field-group">
        <label class="field-label">헬스 목표</label>
        <div class="help-text">원하는 방향을 고르면, 그에 맞는 한 끼를 추천해 드려요.</div>
        <div class="radio-group">
          <label class="radio-pill">
            <input type="radio" name="goal" value="diet" checked />
            다이어트
          </label>
          <label class="radio-pill">
            <input type="radio" name="goal" value="muscle" />
            근력 / 벌크업
          </label>
          <label class="radio-pill">
            <input type="radio" name="goal" value="maintain" />
            유지 / 건강관리
          </label>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">식단 스타일</label>
        <div class="help-text">일단은 간단하게 두 가지만 제공해요.</div>
        <div class="radio-group">
          <label class="radio-pill">
            <input type="radio" name="style" value="basic" checked />
            기본 한국식
          </label>
          <label class="radio-pill">
            <input type="radio" name="style" value="high_protein" />
            고단백 위주
          </label>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">냉장고 속 재료</label>
        <div class="help-text">콤마(,)로 나눠 적어 주세요. 예: 닭가슴살, 고구마, 브로콜리</div>
        <textarea id="ingredients" placeholder="예: 닭가슴살, 달걀, 방울토마토"></textarea>
      </div>

      <button class="btn-recommend" id="recommendBtn">레시피 3개 추천 받기</button>

      <div class="weekly-link">
        <a href="naengjanggo-weekly.html">📅 1주일 식단 제안받기 →</a>
      </div>
    </section>

    <section class="panel">
      <div class="recipes-header">
        <div class="panel-title">2. 추천 레시피</div>
        <small id="recipesHint">왼쪽에서 정보를 입력하고 버튼을 눌러 주세요.</small>
      </div>
      <div class="recipe-list" id="recipeList"></div>
    </section>
  </main>

  <footer>
    냉장고 피트니스 · 초기 실험 버전 · 실제 건강 상태는 꼭 전문가와 상의하세요.
  </footer>

  <script>
    const ingredientsInput = document.getElementById('ingredients');
    const recommendBtn = document.getElementById('recommendBtn');
    const recipeList = document.getElementById('recipeList');
    const recipesHint = document.getElementById('recipesHint');

    recommendBtn.addEventListener('click', async () => {
      const goal = document.querySelector('input[name="goal"]:checked').value;
      const style = document.querySelector('input[name="style"]:checked').value;
      const ingredientsText = document.getElementById('ingredients').value;

      if (!ingredientsText.trim()) {
        alert('냉장고 속 재료를 한 가지 이상 입력해 주세요.');
        document.getElementById('ingredients').focus();
        return;
      }

      const originalBtnText = recommendBtn.textContent;
      recommendBtn.textContent = '추천 생성 중...';
      recommendBtn.disabled = true;
      recipeList.innerHTML = '';
      recipesHint.textContent = 'AI가 레시피를 고민하고 있어요. 잠시만 기다려주세요...';

      try {
        const response = await fetch("https://naengjanggo-fitness-api-1.onrender.com/api/recipes", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ goal, style, ingredients: ingredientsText })
        });

        if (!response.ok) throw new Error("서버에서 오류가 발생했습니다.");

        const data = await response.json();
        const recipes = data.recipes || [];

        recipesHint.textContent = '추천 결과는 참고용입니다. 실제 재료 상태와 알레르기를 꼭 확인하세요.';

        if (recipes.length === 0) {
          recipeList.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-muted);">레시피를 생성하지 못했습니다. 재료를 다시 확인해 주세요.</div>';
        }

        recipes.forEach((r) => {
          const searchQuery = encodeURIComponent(r.youtube_query || r.name);
          const youtubeLink = 'https://www.youtube.com/results?search_query=' + searchQuery;

          let ingredientsHtml = '';
          if (r.ingredients && r.ingredients.length > 0) {
            ingredientsHtml = `
              <div style="margin-top: 12px;">
                <div style="font-weight: 700; font-size: 0.85rem; margin-bottom: 6px; color: var(--text-main);">🥗 재료</div>
                <ul style="margin: 0; padding-left: 20px; font-size: 0.85rem; color: var(--text-muted);">
                  ${r.ingredients.map(ing => `<li>${ing}</li>`).join('')}
                </ul>
              </div>
            `;
          }

          const hasSteps = r.steps && r.steps.length > 0;
          const stepsToggleHtml = hasSteps ? `
            <button class="steps-toggle-btn">🍳 조리 순서 보기</button>
            <div class="steps-panel" style="display:none; margin-top:10px;">
              <div style="font-weight: 700; font-size: 0.85rem; margin-bottom: 6px; color: var(--text-main);">🍳 조리 순서</div>
              <ol style="margin:0; padding-left:20px; font-size:0.85rem; color:var(--text-muted);">
                ${r.steps.map(step => `<li>${step.replace(/^[0-9]+[\.\)\]]*\s*/, '')}</li>`).join('')}
              </ol>
            </div>
          ` : '';

          const div = document.createElement('div');
          div.className = 'recipe-card';
          div.innerHTML = `
            <div class="recipe-name">${r.name}</div>
            <div class="recipe-tags">${r.tags}</div>
            <div class="recipe-desc">${r.desc}</div>
            ${ingredientsHtml}
            ${stepsToggleHtml}
            <div class="recipe-link" style="margin-top: 10px;">
              <a href="${youtubeLink}" target="_blank" rel="noopener noreferrer">
                유튜브에서 비슷한 레시피 보기 →
              </a>
            </div>
          `;
          recipeList.appendChild(div);
        });

      } catch (error) {
        console.error("API 호출 에러:", error);
        alert("레시피 생성 중 오류가 발생했습니다.");
        recipesHint.textContent = '오류가 발생했습니다. 다시 시도해 주세요.';
      } finally {
        recommendBtn.textContent = originalBtnText;
        recommendBtn.disabled = false;
      }
    });

    document.addEventListener('click', (e) => {
      const btn = e.target.closest('.steps-toggle-btn');
      if (!btn) return;
      const panel = btn.nextElementSibling;
      if (!panel || !panel.classList.contains('steps-panel')) return;
      const isOpen = panel.style.display === 'block';
      panel.style.display = isOpen ? 'none' : 'block';
      btn.textContent = isOpen ? '🍳 조리 순서 보기' : '🍳 조리 순서 닫기';
    });
  </script>
</body>
</html>
