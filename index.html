<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QuickBill - 견적서 대시보드</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f8fafc; }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 16px); }
        input, select, button { -webkit-appearance: none; appearance: none; }
        input:focus, select:focus { outline: none; }
        .bottom-nav-item { transition: all 0.15s; }
        .bottom-nav-item.active { color: #2563eb; }
        .card { background: white; border-radius: 16px; border: 1px solid #e5e7eb; }
        .scroll-area { -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body>
    <div id="attendPopup" style="
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.5); z-index:9999;
  align-items:center; justify-content:center;">
  <div style="
    background:white; border-radius:24px;
    padding:30px 24px; width:300px; margin:0 16px;
    text-align:center; position:relative;
    box-shadow:0 20px 60px rgba(74,94,58,0.3);">
    <button onclick="closePopup()" style="
      position:absolute; top:14px; right:16px;
      background:none; border:none; font-size:20px;
      cursor:pointer; color:#aaa;">✕</button>
    <div style="font-size:48px; margin-bottom:10px;">🗓️</div>
    <h2 style="font-size:18px; font-weight:800; color:#333; margin-bottom:6px;">오늘의 출석체크</h2>
    <p style="font-size:13px; color:#888; margin-bottom:20px;" id="popupMsg">출석하고 포인트를 받아요!</p>
    <div style="
      background:#f8f5ef; border-radius:12px; padding:14px;
      margin-bottom:20px; display:flex; justify-content:space-around;">
      <div>
        <div style="font-size:22px; font-weight:800; color:#4a5e3a;" id="popupPoints">0P</div>
        <div style="font-size:11px; color:#aaa;">보유 포인트</div>
      </div>
      <div style="width:1px; background:#eee;"></div>
      <div>
        <div style="font-size:22px; font-weight:800; color:#e07b39;" id="popupStreak">0일</div>
        <div style="font-size:11px; color:#aaa;">🔥 연속 출석</div>
      </div>
    </div>
    <button id="popupAttendBtn" onclick="popupAttend()" style="
      width:100%; padding:14px; border:none; border-radius:12px;
      font-size:16px; font-weight:700; cursor:pointer;
      background:#4a5e3a; color:white; margin-bottom:10px;
      box-shadow:0 4px 15px rgba(74,94,58,0.35);">
      출석하기 (+10P)
    </button>
    <a href="attendance.html" style="display:block; font-size:13px; color:#4a5e3a; text-decoration:none;">
      출석 달력 전체보기 →
    </a>
  </div>
</div>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const MOCK_USER = {
    name: "김대표", businessName: "(주)디자인스튜디오",
    phone: "010-1234-5678", email: "kim@design.com", subscriptionTier: "starter"
};
const MOCK_CLIENTS = [
    { id: 1, name: "카페 오너스", phone: "010-2222-3333", email: "owner@cafe.com" },
    { id: 2, name: "(주)테크컴퍼니", phone: "02-1111-2222", email: "contact@tech.com" },
    { id: 3, name: "인테리어 공방", phone: "010-5555-6666", email: "interior@workshop.com" }
];
const MOCK_INVOICES = [
    { id: 1, clientName: "카페 오너스", date: "2026-03-05",
      items: [{ name: "로고 디자인", quantity: 1, price: 500000 }, { name: "명함 디자인", quantity: 1, price: 150000 }],
      total: 715000, status: "sent" },
    { id: 2, clientName: "(주)테크컴퍼니", date: "2026-03-03",
      items: [{ name: "웹사이트 리뉴얼", quantity: 1, price: 3000000 }, { name: "반응형 최적화", quantity: 1, price: 500000 }],
      total: 3850000, status: "draft" },
    { id: 3, clientName: "인테리어 공방", date: "2026-02-28",
      items: [{ name: "SNS 콘텐츠 제작", quantity: 10, price: 50000 }],
      total: 550000, status: "sent" }
];

function App() {
    const [currentView, setCurrentView] = useState("dashboard");
    const [invoices, setInvoices] = useState(MOCK_INVOICES);
    const [clients, setClients] = useState(MOCK_CLIENTS);
    const [selectedInvoice, setSelectedInvoice] = useState(null);

    const goCreate = (invoice = null) => { setSelectedInvoice(invoice); setCurrentView("create"); };

    return (
        <div className="flex flex-col min-h-screen bg-gray-50">
            {/* 상단 헤더 */}
            <header className="bg-white border-b border-gray-100 px-4 py-3 flex justify-between items-center sticky top-0 z-10 shadow-sm">
                <div>
                    <span className="text-xl font-black text-blue-600">⚡ QuickBill</span>
                </div>
                <div className="flex items-center gap-2">
                    <span className="text-xs bg-blue-50 text-blue-600 px-2 py-1 rounded-full font-medium">Starter</span>
                    <div className="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white text-sm font-bold">
                        {MOCK_USER.name[0]}
                    </div>
                </div>
            </header>

            {/* 메인 컨텐츠 */}
            <main className="flex-1 overflow-y-auto scroll-area pb-24">
                {currentView === "dashboard" && <Dashboard invoices={invoices} goCreate={goCreate} />}
                {currentView === "invoices" && <InvoiceList invoices={invoices} goCreate={goCreate} />}
                {currentView === "create" && (
                    <InvoiceEditor clients={clients} invoices={invoices} setInvoices={setInvoices}
                        setCurrentView={setCurrentView} editingInvoice={selectedInvoice} />
                )}
                {currentView === "clients" && <ClientList clients={clients} setClients={setClients} />}
                {currentView === "settings" && <Settings user={MOCK_USER} />}
            </main>

            {/* 하단 탭 네비게이션 */}
            {currentView !== "create" && (
                <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 safe-bottom z-20">
                    <div className="flex">
                        {[
                            { id: "dashboard", icon: "📊", label: "홈" },
                            { id: "invoices",  icon: "📄", label: "견적서" },
                            { id: "clients",   icon: "👥", label: "거래처" },
                            { id: "settings",  icon: "⚙️", label: "설정" }
                        ].map(item => (
                            <button key={item.id} onClick={() => setCurrentView(item.id)}
                                className={"flex-1 flex flex-col items-center justify-center py-3 bottom-nav-item " +
                                    (currentView === item.id ? "active text-blue-600" : "text-gray-400")}>
                                <span className="text-xl leading-none">{item.icon}</span>
                                <span className={"text-xs mt-1 font-medium " + (currentView === item.id ? "text-blue-600" : "text-gray-400")}>
                                    {item.label}
                                </span>
                                {currentView === item.id && (
                                    <span className="absolute bottom-0 w-8 h-0.5 bg-blue-600 rounded-full"></span>
                                )}
                            </button>
                        ))}
                    </div>
                </nav>
            )}
        </div>
    );
}

function Dashboard({ invoices, goCreate }) {
    const thisMonth = invoices.filter(i => i.date.startsWith("2026-03"));
    const thisMonthTotal = thisMonth.reduce((s, i) => s + i.total, 0);
    const sentCount = invoices.filter(i => i.status === "sent").length;

    return (
        <div className="p-4 space-y-4">
            {/* 인사 + 새 견적서 */}
            <div className="card p-5">
                <p className="text-gray-500 text-sm">안녕하세요 👋</p>
                <h2 className="text-xl font-bold text-gray-800 mt-0.5">{MOCK_USER.name}님</h2>
                <p className="text-xs text-gray-400 mt-1">{MOCK_USER.businessName}</p>
                <button onClick={() => goCreate()}
                    className="w-full mt-4 py-3.5 bg-blue-600 text-white rounded-xl font-semibold text-base active:bg-blue-700">
                    + 새 견적서 작성
                </button>
            </div>

            {/* 통계 카드 */}
            <div className="grid grid-cols-3 gap-3">
                {[
                    { label: "이번달", value: thisMonth.length + "건", icon: "📝", color: "bg-blue-50 text-blue-600" },
                    { label: "총 금액", value: (thisMonthTotal/10000).toFixed(0) + "만", icon: "💰", color: "bg-green-50 text-green-600" },
                    { label: "발송완료", value: sentCount + "건", icon: "✅", color: "bg-purple-50 text-purple-600" },
                ].map((s, i) => (
                    <div key={i} className={"card p-3 text-center " + s.color}>
                        <div className="text-2xl">{s.icon}</div>
                        <div className="text-lg font-black mt-1">{s.value}</div>
                        <div className="text-xs mt-0.5 opacity-70">{s.label}</div>
                    </div>
                ))}
            </div>

            {/* 최근 견적서 */}
            <div className="card p-4">
                <h3 className="font-bold text-gray-800 mb-3">최근 견적서</h3>
                <div className="space-y-2">
                    {invoices.map(inv => (
                        <div key={inv.id} onClick={() => goCreate(inv)}
                            className="flex items-center justify-between p-3 rounded-xl bg-gray-50 active:bg-blue-50 cursor-pointer">
                            <div className="flex items-center gap-3">
                                <div className="w-9 h-9 bg-blue-100 rounded-full flex items-center justify-center text-blue-700 font-bold text-sm flex-shrink-0">
                                    {inv.clientName[0]}
                                </div>
                                <div>
                                    <p className="font-semibold text-gray-800 text-sm">{inv.clientName}</p>
                                    <p className="text-xs text-gray-400">{inv.date}</p>
                                </div>
                            </div>
                            <div className="text-right">
                                <p className="font-bold text-gray-800 text-sm">{(inv.total/10000).toFixed(0)}만원</p>
                                <span className={"text-xs px-2 py-0.5 rounded-full " +
                                    (inv.status === "sent" ? "bg-green-100 text-green-600" : "bg-yellow-100 text-yellow-600")}>
                                    {inv.status === "sent" ? "발송" : "임시"}
                                </span>
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        </div>
    );
}

function InvoiceList({ invoices, goCreate }) {
    return (
        <div className="p-4 space-y-4">
            <div className="flex justify-between items-center">
                <h2 className="text-lg font-bold text-gray-800">견적서 관리</h2>
                <button onClick={() => goCreate()}
                    className="px-4 py-2 bg-blue-600 text-white rounded-xl text-sm font-semibold active:bg-blue-700">
                    + 새 견적서
                </button>
            </div>
            <div className="space-y-3">
                {invoices.map(inv => (
                    <div key={inv.id} onClick={() => goCreate(inv)}
                        className="card p-4 flex justify-between items-center active:bg-gray-50 cursor-pointer">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-700 font-bold flex-shrink-0">
                                {inv.clientName[0]}
                            </div>
                            <div>
                                <p className="font-semibold text-gray-800">{inv.clientName}</p>
                                <p className="text-xs text-gray-400 mt-0.5">{inv.date} · {inv.items.length}개 품목</p>
                            </div>
                        </div>
                        <div className="text-right">
                            <p className="font-bold text-gray-800">{inv.total.toLocaleString()}원</p>
                            <span className={"text-xs px-2 py-0.5 rounded-full mt-1 inline-block " +
                                (inv.status === "sent" ? "bg-green-100 text-green-600" : "bg-yellow-100 text-yellow-600")}>
                                {inv.status === "sent" ? "✓ 발송완료" : "◎ 임시저장"}
                            </span>
                        </div>
                    </div>
                ))}
            </div>
        </div>
    );
}

function InvoiceEditor({ clients, invoices, setInvoices, setCurrentView, editingInvoice }) {
    const [selectedClient, setSelectedClient] = useState(editingInvoice?.clientName || "");
    const [items, setItems] = useState(editingInvoice?.items || [{ name: "", quantity: 1, price: 0 }]);
    const [includeVAT, setIncludeVAT] = useState(true);
    const [showPreview, setShowPreview] = useState(false);
    const [saved, setSaved] = useState(false);

    const subtotal = items.reduce((s, i) => s + i.quantity * i.price, 0);
    const vat = includeVAT ? Math.round(subtotal * 0.1) : 0;
    const total = subtotal + vat;

    const addItem = () => setItems([...items, { name: "", quantity: 1, price: 0 }]);
    const removeItem = idx => setItems(items.filter((_, i) => i !== idx));
    const updateItem = (idx, field, val) => {
        const n = [...items]; n[idx][field] = val; setItems(n);
    };
    const saveInvoice = () => {
        const newInv = { id: editingInvoice?.id || Date.now(), clientName: selectedClient,
            date: new Date().toISOString().split("T")[0], items, total, status: "sent" };
        if (editingInvoice) setInvoices(invoices.map(i => i.id === editingInvoice.id ? newInv : i));
        else setInvoices([newInv, ...invoices]);
        setSaved(true);
        setTimeout(() => setCurrentView("dashboard"), 1000);
    };

    if (showPreview) return (
        <div className="p-4">
            <div className="flex justify-between items-center mb-4">
                <h2 className="text-lg font-bold text-gray-800">미리보기</h2>
                <button onClick={() => setShowPreview(false)} className="text-blue-600 font-medium">← 뒤로</button>
            </div>
            <div className="card p-6">
                <div className="flex justify-between items-start mb-6">
                    <div><h2 className="text-2xl font-black text-gray-900">견적서</h2><p className="text-xs text-gray-400">QUOTATION</p></div>
                    <div className="text-right"><div className="font-black text-blue-600">⚡ QuickBill</div><p className="text-xs text-gray-400">{new Date().toLocaleDateString("ko-KR")}</p></div>
                </div>
                <div className="grid grid-cols-2 gap-3 bg-gray-50 p-3 rounded-xl mb-5 text-sm">
                    <div><p className="text-xs text-gray-400">발신</p><p className="font-bold">{MOCK_USER.businessName}</p><p className="text-gray-500 text-xs">{MOCK_USER.phone}</p></div>
                    <div><p className="text-xs text-gray-400">수신</p><p className="font-bold">{selectedClient || "—"}</p></div>
                </div>
                <table className="w-full text-sm mb-5">
                    <thead><tr className="border-b-2 border-gray-200">
                        <th className="pb-2 text-left text-xs text-gray-400">품목</th>
                        <th className="pb-2 text-center text-xs text-gray-400">수량</th>
                        <th className="pb-2 text-right text-xs text-gray-400">금액</th>
                    </tr></thead>
                    <tbody>{items.map((item, i) => (
                        <tr key={i} className="border-b border-gray-100">
                            <td className="py-2 text-gray-800">{item.name || "—"}</td>
                            <td className="py-2 text-center text-gray-500">{item.quantity}</td>
                            <td className="py-2 text-right font-medium">{(item.quantity*item.price).toLocaleString()}</td>
                        </tr>
                    ))}</tbody>
                </table>
                <div className="space-y-2 text-sm border-t-2 border-gray-200 pt-3">
                    <div className="flex justify-between text-gray-500"><span>소계</span><span>{subtotal.toLocaleString()}원</span></div>
                    {includeVAT && <div className="flex justify-between text-gray-500"><span>부가세 10%</span><span>{vat.toLocaleString()}원</span></div>}
                    <div className="flex justify-between pt-2 border-t border-gray-200">
                        <span className="font-bold text-gray-800 text-base">합계</span>
                        <span className="font-black text-blue-600 text-xl">{total.toLocaleString()}원</span>
                    </div>
                </div>
            </div>
            <button onClick={saveInvoice} disabled={saved}
                className="w-full mt-4 py-4 bg-blue-600 text-white rounded-xl font-bold text-base active:bg-blue-700 disabled:bg-gray-300">
                {saved ? "✅ 저장 완료!" : "💾 저장 및 발송"}
            </button>
        </div>
    );

    return (
        <div className="p-4">
            <div className="flex justify-between items-center mb-4">
                <h2 className="text-lg font-bold text-gray-800">{editingInvoice ? "견적서 편집" : "새 견적서"}</h2>
                <button onClick={() => setCurrentView("dashboard")} className="text-gray-400 text-2xl font-light">✕</button>
            </div>
            {saved && <div className="mb-4 p-3 bg-green-50 rounded-xl text-green-700 text-sm text-center font-medium">✅ 저장됐어요! 이동 중...</div>}

            <div className="space-y-4">
                <div className="card p-4">
                    <label className="block text-sm font-semibold text-gray-700 mb-2">🏢 거래처</label>
                    <select value={selectedClient} onChange={e => setSelectedClient(e.target.value)}
                        className="w-full px-4 py-3 border border-gray-200 rounded-xl text-gray-800 bg-white text-base">
                        <option value="">거래처를 선택하세요</option>
                        {clients.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}
                    </select>
                </div>

                <div className="card p-4">
                    <div className="flex justify-between items-center mb-3">
                        <label className="text-sm font-semibold text-gray-700">📦 품목</label>
                        <button onClick={addItem} className="text-sm text-blue-600 font-semibold bg-blue-50 px-3 py-1.5 rounded-lg active:bg-blue-100">
                            + 추가
                        </button>
                    </div>
                    <div className="space-y-3">
                        {items.map((item, idx) => (
                            <div key={idx} className="bg-gray-50 rounded-xl p-3 space-y-2">
                                <div className="flex gap-2">
                                    <input type="text" placeholder="품목명" value={item.name}
                                        onChange={e => updateItem(idx, "name", e.target.value)}
                                        className="flex-1 px-3 py-2.5 border border-gray-200 rounded-lg text-sm bg-white" />
                                    <button onClick={() => removeItem(idx)}
                                        className="w-9 h-9 flex items-center justify-center text-red-400 bg-red-50 rounded-lg text-lg flex-shrink-0">
                                        ✕
                                    </button>
                                </div>
                                <div className="grid grid-cols-2 gap-2">
                                    <div>
                                        <p className="text-xs text-gray-400 mb-1">수량</p>
                                        <input type="number" value={item.quantity}
                                            onChange={e => updateItem(idx, "quantity", parseInt(e.target.value)||0)}
                                            className="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-sm text-center bg-white" />
                                    </div>
                                    <div>
                                        <p className="text-xs text-gray-400 mb-1">단가 (원)</p>
                                        <input type="number" value={item.price}
                                            onChange={e => updateItem(idx, "price", parseInt(e.target.value)||0)}
                                            className="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-sm text-right bg-white" />
                                    </div>
                                </div>
                                <div className="flex justify-between text-xs text-gray-500 px-1">
                                    <span>소계</span>
                                    <span className="font-semibold text-gray-700">{(item.quantity*item.price).toLocaleString()}원</span>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>

                <div className="card p-4">
                    <label className="flex items-center gap-3 cursor-pointer">
                        <div onClick={() => {}} className={"w-12 h-7 rounded-full transition-colors flex items-center px-1 " + (includeVAT ? "bg-blue-600" : "bg-gray-300")}
                            onClick={() => setIncludeVAT(!includeVAT)}>
                            <div className={"w-5 h-5 bg-white rounded-full shadow transition-transform " + (includeVAT ? "translate-x-5" : "translate-x-0")}></div>
                        </div>
                        <span className="font-medium text-gray-700">부가세 10% 포함</span>
                    </label>
                </div>

                {/* 합계 요약 */}
                <div className="card p-4 bg-blue-50 border-blue-100">
                    <div className="space-y-1.5 text-sm">
                        <div className="flex justify-between text-gray-500"><span>소계</span><span>{subtotal.toLocaleString()}원</span></div>
                        {includeVAT && <div className="flex justify-between text-gray-500"><span>부가세</span><span>{vat.toLocaleString()}원</span></div>}
                        <div className="flex justify-between pt-2 border-t border-blue-200">
                            <span className="font-bold text-gray-800">최종 합계</span>
                            <span className="font-black text-blue-600 text-xl">{total.toLocaleString()}원</span>
                        </div>
                    </div>
                </div>

                <div className="grid grid-cols-2 gap-3 pb-4">
                    <button onClick={() => setShowPreview(true)}
                        className="py-4 border-2 border-blue-600 text-blue-600 rounded-xl font-bold text-base active:bg-blue-50">
                        👁 미리보기
                    </button>
                    <button onClick={saveInvoice} disabled={!selectedClient || saved}
                        className="py-4 bg-blue-600 text-white rounded-xl font-bold text-base active:bg-blue-700 disabled:bg-gray-300">
                        💾 저장
                    </button>
                </div>
            </div>
        </div>
    );
}

function ClientList({ clients, setClients }) {
    const [showForm, setShowForm] = useState(false);
    const [newClient, setNewClient] = useState({ name: "", phone: "", email: "" });

    const addClient = () => {
        if (!newClient.name) return;
        setClients([...clients, { ...newClient, id: Date.now() }]);
        setNewClient({ name: "", phone: "", email: "" });
        setShowForm(false);
    };

    return (
        <div className="p-4 space-y-4">
            <div className="flex justify-between items-center">
                <h2 className="text-lg font-bold text-gray-800">거래처 관리</h2>
                <button onClick={() => setShowForm(!showForm)}
                    className="px-4 py-2 bg-blue-600 text-white rounded-xl text-sm font-semibold">

                <div className="card p-4 space-y-3">

                    {[["name","거래처명 *"],["phone","연락처"],["email","이메일"]].map(([f, p]) => (
                        <input key={f} type="text" placeholder={p} value={newClient[f]}

}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
 <script>
  const ATTEND_KEY = 'attendance_data';
  function getAttendData() {
    const raw = localStorage.getItem(ATTEND_KEY);
    return raw ? JSON.parse(raw) : {totalPoints:0,streak:0,totalDays:0,lastAttendDate:null,attendedDates:[],history:[]};
  }
  function saveAttendData(d) { localStorage.setItem(ATTEND_KEY, JSON.stringify(d)); }
  function todayStr() { return new Date().toISOString().slice(0,10); }
  function yestStr()  { const d=new Date(); d.setDate(d.getDate()-1); return d.toISOString().slice(0,10); }

  function openAttendPopup() {
    const data = getAttendData();
    document.getElementById('popupPoints').textContent = data.totalPoints + 'P';
    document.getElementById('popupStreak').textContent = data.streak + '일';
    if (data.lastAttendDate === todayStr()) {
      document.getElementById('popupMsg').textContent = '오늘 이미 출석했어요! 🎉';
      const btn = document.getElementById('popupAttendBtn');
      btn.textContent = '✅ 출석 완료!';
      btn.style.background = '#eef3eb';
      btn.style.color = '#4a5e3a';
      btn.style.boxShadow = 'none';
      btn.onclick = null;
    }
    document.getElementById('attendPopup').style.display = 'flex';
  }

  function closePopup() {
    document.getElementById('attendPopup').style.display = 'none';
  }

  function popupAttend() {
    const data = getAttendData();
    const today = todayStr();
    if (data.lastAttendDate === today) return;
    data.streak = data.lastAttendDate === yestStr() ? data.streak + 1 : 1;
    data.totalPoints += 10; data.totalDays += 1; data.lastAttendDate = today;
    if (!data.attendedDates.includes(today)) data.attendedDates.push(today);
    data.history.unshift({date:today, point:10, reason:'출석체크'});
    saveAttendData(data);
    document.getElementById('popupPoints').textContent = data.totalPoints + 'P';
    document.getElementById('popupStreak').textContent = data.streak + '일';
    document.getElementById('popupMsg').textContent = '+10P 획득! ' + data.streak + '일 연속 🔥';
    const btn = document.getElementById('popupAttendBtn');
    btn.textContent = '✅ 출석 완료!';
    btn.style.background = '#eef3eb';
    btn.style.color = '#4a5e3a';
    btn.style.boxShadow = 'none';
    btn.onclick = null;
  }

  // 앱 실행 시 하루 1번 자동 팝업 (1.5초 후)
  (function() {
    const shown = sessionStorage.getItem('attend_popup_shown');
    if (!shown) {
      setTimeout(openAttendPopup, 1500);
      sessionStorage.setItem('attend_popup_shown', '1');
    }
  })();
</script>   
</body>
</html>
